name: evolve
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'evolution topic'
        required: false
        default: 'ai agent eval harness autonomous coding workflows'
      batch_id:
        description: 'daily batch id, default UTC yyyyMMdd'
        required: false
        default: ''
      open_pr:
        description: 'create/update PR after committing this batch run'
        required: false
        default: 'true'
  push:
    paths:
      - 'tasks/**'
      - 'scripts/**'
      - '.github/workflows/evolve.yml'
concurrency:
  group: evolve-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  pull-requests: write
jobs:
  evolve:
    runs-on: ubuntu-latest
    env:
      EVOLUTION_TOPIC: ${{ github.event.inputs.topic || 'ai agent eval harness autonomous coding workflows' }}
      EVOLUTION_BATCH_ID: ${{ github.event.inputs.batch_id || '' }}
      EVOLUTION_OPEN_PR: ${{ github.event.inputs.open_pr || 'true' }}
      EVOLUTION_GIST_ID: ${{ vars.EVOLUTION_GIST_ID || 'a3537d1e1b113bd4ef215463cc80c760' }}
      GPT55_5YUANTOKEN_API_KEY: ${{ secrets.GPT55_5YUANTOKEN_API_KEY }}
      DEEPSEEK_V4_FLASH_API_KEY: ${{ secrets.DEEPSEEK_V4_FLASH_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
      EVOLUTION_QUEUE_LEASE_MINUTES: '45'
      EVOLUTION_QUEUE_MAX_ATTEMPTS: '4'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: prepare daily batch branch
        run: |
          set -euo pipefail
          BATCH_ID="${EVOLUTION_BATCH_ID:-$(date -u +%Y%m%d)}"
          BRANCH="bot/evolver-daily/${BATCH_ID}"
          echo "EVOLUTION_BATCH_ID=${BATCH_ID}" >> "$GITHUB_ENV"
          echo "EVOLUTION_BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          git fetch origin "$BRANCH" || true
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: claim Gist queue task lease
        run: python scripts/gist_queue_state.py claim
      - name: run evolver evomap
        run: python scripts/evolver.py
      - name: run GPT-5.5 analysis
        run: python scripts/gpt55_analyze.py
      - name: backup latest result to Gist and sync PHI_RATIO
        run: python scripts/gist_backup.py
      - name: mark queue task completed
        if: success()
        run: python scripts/gist_queue_state.py complete
      - name: mark queue task failed with backoff/quarantine
        if: failure()
        run: python scripts/gist_queue_state.py fail || true
      - name: commit batch result
        if: always()
        run: |
          set -euo pipefail
          git config user.name 'hermes-evolver'
          git config user.email 'actions@github.com'
          git add inbox/ genes/ research/ logs/
          if git diff --cached --quiet; then
            echo 'nothing to commit'
          else
            git commit -m "chore: daily evolver batch ${EVOLUTION_BATCH_ID} run ${GITHUB_RUN_ID}"
            git push --force-with-lease origin "$EVOLUTION_BRANCH"
          fi

      - name: open or update draft PR for successful batch
        if: ${{ success() && env.EVOLUTION_OPEN_PR == 'true' }}
        run: |
          set -euo pipefail
          TITLE="chore: daily evolver batch ${EVOLUTION_BATCH_ID}"
          BODY="Automated Super-Evolution-2 daily batch proposal. Batch=${EVOLUTION_BATCH_ID}; latest_workflow_run=${GITHUB_RUN_ID}; queue=lease/backoff/quarantine enabled; branch=${EVOLUTION_BRANCH}. Auto-open is enabled for successful runs only; duplicate PRs are suppressed by checking the branch first."
          EXISTING_PR_URL=$(gh pr list \
            --repo appleoppa/hermes-github-evolution \
            --head "$EVOLUTION_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // empty')

          if [ -n "$EXISTING_PR_URL" ]; then
            echo "existing PR found for ${EVOLUTION_BRANCH}: ${EXISTING_PR_URL}"
            gh pr edit "$EXISTING_PR_URL" \
              --repo appleoppa/hermes-github-evolution \
              --title "$TITLE" \
              --body "$BODY"
            exit 0
          fi

          gh pr create \
            --repo appleoppa/hermes-github-evolution \
            --base main \
            --head "$EVOLUTION_BRANCH" \
            --title "$TITLE" \
            --body "$BODY" \
            --draft

      - name: report deferred PR creation
        if: ${{ success() && env.EVOLUTION_OPEN_PR != 'true' }}
        run: echo "deferred PR creation for batch ${EVOLUTION_BATCH_ID}; branch=${EVOLUTION_BRANCH}"
